name: Hex Publish

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
        description: "Working directory for mix commands"
      env-vars:
        type: string
        default: "{}"
        description: "JSON object with extra environment variables"
      elixir-version:
        type: string
        default: "1.19"
        description: "Elixir version used to publish"
      otp-version:
        type: string
        default: "28"
        description: "OTP version used to publish"
      install-rust:
        type: boolean
        default: false
        description: "Install Rust before publishing"
      rust-version:
        type: string
        default: "stable"
        description: "Rust toolchain version used when install-rust is enabled"
      pre-publish-command:
        type: string
        default: ""
        description: "Optional command run before publish-command"
      publish-command:
        type: string
        default: "mix hex.publish --yes"
        description: "Command used to publish the package"
    secrets:
      HEX_API_KEY:
        required: true

jobs:
  publish:
    name: Publish to Hex
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Export custom environment variables
        if: inputs.env-vars != '{}'
        env:
          INPUT_ENV_VARS: ${{ inputs.env-vars }}
        run: |
          printf '%s' "$INPUT_ENV_VARS" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Setup Rust
        if: inputs.install-rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          elixir-version: ${{ inputs.elixir-version }}

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run pre-publish command
        if: inputs.pre-publish-command != ''
        run: ${{ inputs.pre-publish-command }}

      - name: Publish to Hex
        run: ${{ inputs.publish-command }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
